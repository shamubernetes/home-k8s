apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: palworld
spec:
  endpoints:
    - dnsName: palworld.${GAME_DOMAIN}
      recordType: CNAME
      targets:
        - external.${GAME_DOMAIN}
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
