# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Flux Failure Issue"

on:
  repository_dispatch:

permissions:
  contents: read

jobs:
  create-issue:
    name: Create Failure Issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Flux emits actions such as "Kustomization/name.namespace" and "HelmRelease/name.namespace".
    if: |
      github.event.client_payload.severity == 'error' &&
      (startsWith(github.event.action, 'Kustomization/') || startsWith(github.event.action, 'HelmRelease/'))
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Generate Token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      with:
        app-id: "${{ secrets.BOT_APP_ID }}"
        private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
        permission-issues: write

    - name: Create or update failure issue
      env:
        GH_REPO: ${{ github.repository }}
        GH_TOKEN: "${{ steps.app-token.outputs.token }}"
      run: scripts/handle-flux-failure-event "$GITHUB_EVENT_PATH"
