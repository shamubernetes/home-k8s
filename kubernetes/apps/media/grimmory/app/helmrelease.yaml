# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ${APP}
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
  - name: rook-ceph-cluster
    namespace: rook-ceph
  - name: volsync
    namespace: volsync-system
  values:
    controllers:
      grimmory:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/grimmory/grimmory
              tag: v3.2.2@sha256:98ad96816b7eff9cb754ef70413491b66d23d10946fab27d7217d6c45dfd7fce
            env:
              TZ: ${TIMEZONE}
              USER_ID: "568"
              GROUP_ID: "568"
              SWAGGER_ENABLED: "false"
              FORCE_DISABLE_OIDC: "false"
            envFrom: &envFrom
            - secretRef:
                name: grimmory-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE"]
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
          mariadb:
            image:
              repository: docker.io/linuxserver/mariadb
              tag: 11.4.8@sha256:11fa225bdec1f3300712be7e712222afe2c0ab69008a6ef43d216032696ae22b
            env:
              PUID: "568"
              PGID: "568"
              TZ: ${TIMEZONE}
            envFrom: *envFrom
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                    - /usr/bin/mariadb-admin
                    - ping
                    - -h
                    - localhost
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness: &mariadbProbes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                    - /usr/bin/mariadb-admin
                    - ping
                    - -h
                    - localhost
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *mariadbProbes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE"]
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: grimmory
        ports:
          http:
            port: *port
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: internal.${HOME_DOMAIN}
        className: internal
        hosts:
        - host: "{{ .Release.Name }}.${HOME_DOMAIN}"
          paths:
          - path: /
            service:
              identifier: app
              port: http
    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          grimmory:
            app:
            - path: /app/data
              subPath: grimmory-data
            mariadb:
            - path: /config
              subPath: mariadb-config
      media:
        type: nfs
        server: "${IPAM_IP_NFS}"
        path: /mnt/user/Media
        advancedMounts:
          grimmory:
            app:
            - path: /books
              subPath: Books
            - path: /bookdrop
              subPath: Books/bookdrop
