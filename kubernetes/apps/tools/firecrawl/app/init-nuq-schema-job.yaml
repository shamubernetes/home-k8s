# yaml-language-server: $schema=https://k8s-schemas.pages.dev/kubernetes/master/job-batch-v1.json
apiVersion: batch/v1
kind: Job
metadata:
  name: firecrawl-init-nuq-schema-v2
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init-nuq-schema
        image: docker.io/library/postgres:17-alpine@sha256:af194ccf3e2d7fe367012c7b88ce8b816c5c889b18a5b316799a1f0d7eac746a
        envFrom:
        - secretRef:
            name: firecrawl-secret
        command:
        - /bin/sh
        - -ec
        - psql "$NUQ_DATABASE_URL" -v ON_ERROR_STOP=1 -f /schema/nuq-schema.sql
        volumeMounts:
        - name: schema
          mountPath: /schema
          readOnly: true
      volumes:
      - name: schema
        configMap:
          name: firecrawl-nuq-schema
