apiVersion: batch/v1
kind: Job
metadata:
  name: legacy-plan-cleanup
  namespace: system-upgrade
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: tuppr
      restartPolicy: Never
      containers:
      - name: cleanup
        image: docker.io/bitnami/kubectl:latest@sha256:323998cf83a2332f6761706df910870a3fa24dd8d4b999db977aa322de553399
        command:
        - /bin/sh
        - -c
        - kubectl delete plan.upgrade.cattle.io talos kubernetes --ignore-not-found=true
