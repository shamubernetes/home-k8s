# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cs2
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      cs2:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          fix-perms:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                chown 1000:1000 /home/steam/cs2-dedicated /home/steam/Steam
            securityContext:
              runAsUser: 0
        containers:
          app:
            image:
              repository: joedwards32/cs2
              tag: 4.0.1@sha256:34c093d24a23751fb409ae41dffe88884fb36964b365fcd25a31ec45e88ad8cf
            env:
              - name: CS2_CHEATS
                value: "1"
              - name: CS2_MAXPLAYERS
                value: "20"
            envFrom:
              - secretRef:
                  name: cs2-secret
            securityContext:
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 10m
    defaultPodOptions:
      annotations:
        descheduler.alpha.kubernetes.io/evict: "false"
    service:
      app:
        controller: cs2
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "${IPAM_IP_CS2}"
        ports:
          game-tcp:
            primary: true
            enabled: true
            port: 27015
            protocol: TCP
          game-udp:
            enabled: true
            port: 27015
            protocol: UDP
          rcon:
            enabled: true
            port: 27020
            protocol: UDP
    persistence:
      config:
        existingClaim: cs2
        globalMounts:
          - path: /home/steam/cs2-dedicated
      home:
        existingClaim: cs2-home
        globalMounts:
          - path: /home/steam/Steam
      scripts:
        type: configMap
        name: cs2-scripts
        defaultMode: 0755
        globalMounts:
          - path: /home/steam/cs2-dedicated/pre.sh
            subPath: pre.sh
