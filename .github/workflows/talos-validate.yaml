# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Talos - Validate"

on:
  pull_request:
    branches: ["main"]
    paths:
    - ".github/workflows/talos-validate.yaml"
    - ".mise.toml"
    - ".taskfiles/Talos/**"
    - "Taskfile.yaml"
    - "talos/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Talos - Validate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Install tools
      uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      with:
        install_args: task talosctl github:budimanjojo/talhelper

    - name: Validate Talos machine configs
      run: task talos:validate