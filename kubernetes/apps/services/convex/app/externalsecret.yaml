# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: convex
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: convex-secret
    template:
      engineVersion: v2
      data:
        POSTGRES_URL: |-
          postgresql://{{ .CONVEX_POSTGRES_USER }}:{{ .CONVEX_POSTGRES_PASS }}@postgres17-pooler.database.svc.cluster.local
        INSTANCE_SECRET: "{{ .CONVEX_INSTANCE_SECRET }}"
        AWS_ACCESS_KEY_ID: "{{ .S3_ACCESS_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .S3_SECRET_KEY }}"
        # postgres-init
        INIT_POSTGRES_DBNAME: convex
        INIT_POSTGRES_HOST: postgres17-pooler.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .CONVEX_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .CONVEX_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
  # Postgres creds + instance secret from 1Password
  - extract:
      key: convex
    sourceRef:
      storeRef:
        kind: ClusterSecretStore
        name: op-secret-store
  - extract:
      key: cloudnative-pg
    sourceRef:
      storeRef:
        kind: ClusterSecretStore
        name: op-secret-store
  # S3 creds from CephObjectStoreUser (auto-generated in rook-ceph namespace)
  - extract:
      key: rook-ceph-object-user-ceph-objectstore-convex
    rewrite:
    - regexp:
        source: "AWS_ACCESS_KEY_ID"
        target: "S3_ACCESS_KEY"
    - regexp:
        source: "AWS_SECRET_ACCESS_KEY"
        target: "S3_SECRET_KEY"
    sourceRef:
      storeRef:
        kind: ClusterSecretStore
        name: rook-ceph-secrets
