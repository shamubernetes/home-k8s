---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: disabled-subchart
  namespace: tools
spec:
  chart:
    spec:
      chart: example
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: example
  values:
    postgresql:
      enabled: false
      image:
        repository: docker.io/library/postgres
        tag: latest
