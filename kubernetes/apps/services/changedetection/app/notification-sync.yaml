---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: changedetection-notification-sync
spec:
  schedule: "17 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: sync
            image: curlimages/curl:8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
            envFrom:
            - secretRef:
                name: changedetection-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop: ["ALL"]
            command:
            - /bin/sh
            - -ec
            - |
              api_url="http://changedetection-app.services.svc.cluster.local:5000/api/v1/notifications"
              current="$$(curl -fsS -H "x-api-key: $${CHANGEDETECTION_API_TOKEN}" "$${api_url}")"

              case "$${current}" in
                *"$${CHANGEDETECTION_NOTIFICATION_URL}"*)
                  echo "Pushover notification URL already configured."
                  exit 0
                  ;;
              esac

              curl -fsS \
                -X POST \
                -H "x-api-key: $${CHANGEDETECTION_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"notification_urls\":[\"$${CHANGEDETECTION_NOTIFICATION_URL}\"]}" \
                "$${api_url}" >/dev/null

              echo "Added Pushover notification URL."
