---
# yaml-language-server: $schema=https://k8s-schemas.pages.dev/tailscale.com/connector_v1alpha1.json
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: titans-subnet-router
spec:
  hostname: titans-subnet-router
  subnetRouter:
    advertiseRoutes:
    - 10.0.10.0/24
    - 10.0.222.0/24
    - 10.50.0.0/24
    - 10.100.0.0/24
    - 10.100.47.0/24
    # Host routes for critical DNS/ingress/LB services. These help iOS prefer
    # Tailscale over overlapping private routes on arbitrary WiFi networks.
    - 10.100.47.200/32
    - 10.100.47.201/32
    - 10.100.47.202/32
    - 10.100.47.230/32
    - 10.100.47.249/32
    - 10.100.47.250/32
    - 10.107.104.0/22
    - 10.108.108.0/23
    - 10.255.253.0/24
  tags:
  - tag:k8s
