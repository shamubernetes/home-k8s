---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-migration-finance-daily-balances
  namespace: services
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS finance_daily_balances (
      id SERIAL PRIMARY KEY,
      run_date DATE NOT NULL,
      account_name VARCHAR(100) NOT NULL,
      last4 VARCHAR(4),
      balance NUMERIC(12,2) NOT NULL,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
      UNIQUE(run_date, account_name)
    );
    CREATE INDEX IF NOT EXISTS idx_finance_daily_balances_date ON finance_daily_balances(run_date DESC);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-migrate-finance-balances
  namespace: services
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/home-operations/postgres-init:17.6.0@sha256:86a1992d46273c58fd4ad95b626081dfaabfe16bd56944675169e406d1a660dd
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: port
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: password
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: database
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Running finance daily balances migration..."
              psql -f /migrations/init.sql
              echo "Migration complete."
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: n8n-migration-finance-daily-balances
