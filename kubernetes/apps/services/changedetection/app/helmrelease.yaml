# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app changedetection
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
  - name: rook-ceph-cluster
    namespace: rook-ceph
  - name: volsync
    namespace: volsync-system
  values:
    controllers:
      changedetection:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dgtlmoon/changedetection.io
              tag: 0.55.7@sha256:ea7429f478394d96c8d8b545e4aa93eb17c7ac3ccb06e0ae9f49d15b428f0b84
            env:
              BASE_URL: https://changedetection.${HOME_DOMAIN}
              DISABLE_VERSION_CHECK: "true"
              PLAYWRIGHT_DRIVER_URL: ws://changedetection-playwright.services.svc.cluster.local:3000
              PORT: &port 5000
              TZ: ${TIMEZONE}
              USE_X_SETTINGS: "1"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
      playwright:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/dgtlmoon/sockpuppetbrowser
              tag: latest@sha256:6168d5729905aa6ec1e62870ec8245b64c0bf1c7d7bafa3990cb33a4fff08960
            env:
              CONNECTION_TIMEOUT: "600000"
              DEFAULT_BLOCK_ADS: "true"
              ENABLE_DEBUGGER: "false"
              MAX_CONCURRENT_CHROME_PROCESSES: "3"
              MAX_CONCURRENT_SESSIONS: "3"
              PREBOOT_CHROME: "false"
              SCREEN_DEPTH: "16"
              SCREEN_HEIGHT: "1024"
              SCREEN_WIDTH: "1920"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: changedetection
        ports:
          http:
            port: *port
      playwright:
        controller: playwright
        ports:
          http:
            port: 3000
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: internal.${HOME_DOMAIN}
        className: internal
        hosts:
        - host: "{{ .Release.Name }}.${HOME_DOMAIN}"
          paths:
          - path: /
            service:
              identifier: app
              port: http
    persistence:
      datastore:
        existingClaim: *app
        advancedMounts:
          changedetection:
            app:
            - path: /datastore
      tmp:
        type: emptyDir
        advancedMounts:
          changedetection:
            app:
            - path: /tmp
      playwright-tmp:
        type: emptyDir
        advancedMounts:
          playwright:
            app:
            - path: /tmp
      playwright-dev-shm:
        type: emptyDir
        advancedMounts:
          playwright:
            app:
            - path: /dev/shm
