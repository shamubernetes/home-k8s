# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cowtail
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      cowtail:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maudecode/cowtail
              tag: 0.5.2@sha256:54dd8ea9b3a2949aea41ed152c82470c8c7fbdd5a7f851dccc1d0e0113c0d75f
            env:
              TZ: America/New_York
              CONVEX_API_UPSTREAM: http://convex-backend.services.svc.cluster.local:3210
              CONVEX_ACTIONS_UPSTREAM: http://convex-backend.services.svc.cluster.local:3211/
              PROMETHEUS_UPSTREAM: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/
              UNIVERSAL_LINKS_APP_ID:
                valueFrom:
                  secretKeyRef:
                    name: cowtail-secret
                    key: UNIVERSAL_LINKS_APP_ID
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    configMaps:
      config:
        data:
          config.json: |
            {
              "cephDashboardUrl": "https://rook.${HOME_DOMAIN}"
            }
    persistence:
      config:
        type: configMap
        name: cowtail
        advancedMounts:
          cowtail:
            app:
            - path: /etc/cowtail
              readOnly: true
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: cowtail
        ports:
          http:
            port: *port
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${HOME_DOMAIN}
        className: external
        hosts:
        - host: cowtail.${HOME_DOMAIN}
          paths:
          - path: /
            service:
              identifier: app
              port: http
