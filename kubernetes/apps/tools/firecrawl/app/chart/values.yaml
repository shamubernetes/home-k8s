replicaCount: 1

resources:
  enabled: false

api:
  replicaCount: 1
  resources:
    requests:
      memory: "4G"
      cpu: "2000m"
    limits:
      memory: "6G"
      cpu: "2000m"

worker:
  replicaCount: 1
  port: 3005
  resources:
    requests:
      memory: "3G"
      cpu: "1000m"
    limits:
      memory: "4G"
      cpu: "1000m"

extractWorker:
  enabled: true
  replicaCount: 1
  port: 3004
  resources:
    requests:
      memory: "2G"
      cpu: "1000m"
    limits:
      memory: "3G"
      cpu: "1000m"

nuqWorker:
  replicaCount: 5
  port: 3006
  resources:
    requests:
      memory: "3G"
      cpu: "1000m"
    limits:
      memory: "4G"
      cpu: "1000m"

nuqPrefetchWorker:
  enabled: true
  replicaCount: 1
  port: 3011
  resources:
    requests:
      memory: "1G"
      cpu: "500m"
    limits:
      memory: "2G"
      cpu: "1000m"

nuqPostgres:
  # Set to false to disable the in-cluster PostgreSQL deployment and use an external instance instead.
  enabled: true
  replicaCount: 1
  image:
    repository: docker.io/winkkgmbh/nuq-postgres
    tag: latest
    pullPolicy: Always
  auth:
    username: postgres
    password: password
    database: postgres
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  persistence:
    enabled: false
    size: 10Gi
    storageClass: ""
  # External PostgreSQL configuration — used when nuqPostgres.enabled is false.
  external:
    # Full connection URL (takes precedence over individual fields if set).
    # e.g. "postgresql://user:password@my-postgres-host:5432/mydb"
    url: ""
    # Individual connection fields (used to build the URL when url is empty).
    host: ""
    port: 5432
    username: postgres
    password: ""
    database: postgres

rabbitmq:
  # Set to false to disable the in-cluster RabbitMQ deployment and provide an external URL instead.
  enabled: true
  image: rabbitmq:3-management
  replicaCount: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  # External RabbitMQ configuration — used when rabbitmq.enabled is false.
  external:
    # Full AMQP URL. e.g. "amqp://user:password@my-rabbitmq-host:5672/vhost"
    url: ""

image:
  repository: docker.io/winkkgmbh/firecrawl
  tag: "latest"
  pullPolicy: Always
  dockerSecretEnabled: false

playwright:
  repository: docker.io/winkkgmbh/firecrawl-playwright
  tag: "latest"
  pullPolicy: Always
  replicaCount: 1

redis:
  # Set to false to disable the in-cluster Redis deployment and use an external instance instead.
  enabled: true
  image: redis:alpine
  replicaCount: 1
  # External Redis configuration — used when redis.enabled is false.
  external:
    # Full Redis URL. e.g. "redis://:password@my-redis-host:6379"
    url: ""
    # Separate rate-limit Redis URL (falls back to url if not set).
    rateLimitUrl: ""

service:
  api:
    type: ClusterIP
    port: 3002
  playwright:
    type: ClusterIP
    port: 3000
  redis:
    type: ClusterIP
    port: 6379
  rabbitmq:
    type: ClusterIP
    port: 5672
    managementPort: 15672

config:
  NUM_WORKERS_PER_QUEUE: "8"
  PORT: "3002"
  HOST: "0.0.0.0"
  WORKER_PORT: "3005"
  EXTRACT_WORKER_PORT: "3004"
  NUQ_WORKER_PORT: "3006"
  NUQ_PREFETCH_WORKER_PORT: "3011"
  NUQ_WORKER_COUNT: "5"
  USE_DB_AUTHENTICATION: "false"
  IS_KUBERNETES: "true"
  ENV: "production"
  LOGGING_LEVEL: "INFO"
  FIRECRAWL_APP_SCHEME: "http"
  FIRECRAWL_APP_HOST: ""
  FIRECRAWL_APP_PORT: ""
  REDIS_URL: ""
  REDIS_RATE_LIMIT_URL: ""
  PLAYWRIGHT_MICROSERVICE_URL: ""
  NUQ_DATABASE_URL: ""
  NUQ_DATABASE_URL_LISTEN: ""
  NUQ_RABBITMQ_URL: ""
  OPENAI_BASE_URL: ""
  MODEL_NAME: ""
  MODEL_EMBEDDING_NAME: ""
  OLLAMA_BASE_URL: ""
  PROXY_SERVER: ""
  PROXY_USERNAME: ""
  SEARXNG_ENDPOINT: ""
  SEARXNG_ENGINES: ""
  SEARXNG_CATEGORIES: ""
  SELF_HOSTED_WEBHOOK_URL: ""
  extra: {}

playwrightConfig:
  PORT: "3000"
  ALLOW_LOCAL_WEBHOOKS: ""
  BLOCK_MEDIA: ""
  MAX_CONCURRENT_PAGES: "10"

secret:
  OPENAI_API_KEY: ""
  SLACK_WEBHOOK_URL: ""
  LLAMAPARSE_API_KEY: ""
  BULL_AUTH_KEY: ""
  TEST_API_KEY: ""
  FIRE_ENGINE_BETA_URL: ""
  SUPABASE_ANON_TOKEN: ""
  SUPABASE_URL: ""
  SUPABASE_SERVICE_TOKEN: ""
  PROXY_PASSWORD: ""
  SELF_HOSTED_WEBHOOK_HMAC_SECRET: ""
  REDIS_PASSWORD: ""
  extra: {}

imagePullSecrets:
  - name: docker-registry-secret
