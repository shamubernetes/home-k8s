# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app documenso
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      documenso:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17.6.0@sha256:86a1992d46273c58fd4ad95b626081dfaabfe16bd56944675169e406d1a660dd
            envFrom: &envFrom
            - secretRef:
                name: documenso-secret
        containers:
          app:
            image:
              repository: docker.io/documenso/documenso
              tag: v2.14.0@sha256:f1043654ffd88edffa6ba5b2bbda2897723fc5e9ae06f56c1fe514ee2b567f05
            env:
              PORT: &port 3000
              NEXT_PUBLIC_WEBAPP_URL: https://documenso.${HOME_DOMAIN}
              NEXT_PRIVATE_INTERNAL_WEBAPP_URL: http://documenso.services.svc.cluster.local:3000
              NEXT_PUBLIC_UPLOAD_TRANSPORT: database
              NEXT_PRIVATE_SIGNING_TRANSPORT: local
              NEXT_PRIVATE_SMTP_TRANSPORT: smtp-auth
              NEXT_PRIVATE_SMTP_HOST: smtp-relay.network.svc.cluster.local
              NEXT_PRIVATE_SMTP_PORT: "25"
              NEXT_PRIVATE_SMTP_SECURE: "false"
              NEXT_PRIVATE_SMTP_UNSAFE_IGNORE_TLS: "true"
              NEXT_PRIVATE_JOBS_PROVIDER: local
              NEXT_PRIVATE_REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379/13
              NEXT_PRIVATE_REDIS_PREFIX: documenso
              NEXT_PRIVATE_DOCUMENT_CONVERSION_URL: http://documenso-gotenberg.services.svc.cluster.local:3000
              NEXT_PRIVATE_DOCUMENT_CONVERSION_TIMEOUT_MS: "60000"
              NEXT_PUBLIC_DOCUMENT_SIZE_UPLOAD_LIMIT: "25"
              NEXT_PUBLIC_POSTHOG_KEY: ""
              NEXT_PUBLIC_FEATURE_BILLING_ENABLED: "false"
              DOCUMENSO_DISABLE_TELEMETRY: "true"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 90
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: documenso
        ports:
          http:
            primary: true
            port: *port
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: internal.${HOME_DOMAIN}
          nginx.ingress.kubernetes.io/proxy-body-size: 100m
        className: internal
        hosts:
        - host: documenso.${HOME_DOMAIN}
          paths:
          - path: /
            service:
              identifier: app
              port: http
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
        - path: /tmp
