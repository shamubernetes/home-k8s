---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-cowtail-weekly-review
  namespace: services
data:
  workflow.json: |
    {
      "nodes": [
        {
          "parameters": {
            "rule": {
              "interval": [{"field": "cronExpression", "expression": "0 9 * * 1"}]
            }
          },
          "id": "schedule-trigger",
          "name": "Monday 9 AM",
          "type": "n8n-nodes-base.scheduleTrigger",
          "typeVersion": 1.2,
          "position": [0, 0]
        },
        {
          "parameters": {
            "operation": "getItemDetails",
            "vaultUUID": "pc3wob7gb4f4vmsubawergeira",
            "itemUUID": "2jqh7c75ijlaeog2nafir77jre",
            "requestOptions": {}
          },
          "id": "get-webhook-token",
          "name": "Get Webhook Token",
          "type": "@n8layer/n8n-nodes-1password.onePassword",
          "typeVersion": 1,
          "position": [220, 0],
          "credentials": {
            "onePasswordApi": {
              "id": "",
              "name": "1Password Connect"
            }
          }
        },
        {
          "parameters": {
            "assignments": {
              "assignments": [
                {"id": "webhookToken", "name": "webhookToken", "value": "={{ $json.fields.find(f => f.label === 'OPENCLAW_WEBHOOK_TOKEN').value }}", "type": "string"}
              ]
            },
            "options": {}
          },
          "id": "set-token",
          "name": "Set Token",
          "type": "n8n-nodes-base.set",
          "typeVersion": 3.4,
          "position": [440, 0]
        },
        {
          "parameters": {
            "method": "POST",
            "url": "http://convex-backend.services.svc.cluster.local:3210/api/query",
            "sendHeaders": true,
            "headerParameters": {
              "parameters": [
                {"name": "Content-Type", "value": "application/json"}
              ]
            },
            "sendBody": true,
            "specifyBody": "json",
            "jsonBody": "={\"path\":\"alerts:getByTimeRange\",\"args\":{\"from\":{{ $now.minus(7, 'days').toMillis() }},\"to\":{{ $now.toMillis() }}},\"format\":\"json\"}",
            "options": {}
          },
          "id": "fetch-digest",
          "name": "Fetch Week HTML",
          "type": "n8n-nodes-base.httpRequest",
          "typeVersion": 4.2,
          "position": [660, 0]
        },
        {
          "parameters": {
            "method": "POST",
            "url": "http://10.0.10.95:18789/hooks/cowtail-review",
            "sendHeaders": true,
            "headerParameters": {
              "parameters": [
                {
                  "name": "Authorization",
                  "value": "=Bearer {{ $('Set Token').item.json.webhookToken }}"
                },
                {
                  "name": "Content-Type",
                  "value": "application/json"
                }
              ]
            },
            "sendBody": true,
            "bodyParameters": {
              "parameters": [
                {
                  "name": "alerts",
                  "value": "={{ JSON.stringify($('Fetch Week HTML').item.json.value) }}"
                },
                {
                  "name": "from",
                  "value": "={{ $now.minus(7, 'days').format('yyyy-MM-dd') }}"
                },
                {
                  "name": "to",
                  "value": "={{ $now.format('yyyy-MM-dd') }}"
                }
              ]
            },
            "options": {}
          },
          "id": "webhook-openclaw",
          "name": "Send to Maude",
          "type": "n8n-nodes-base.httpRequest",
          "typeVersion": 4.2,
          "position": [880, 0]
        }
      ],
      "connections": {
        "Monday 9 AM": {
          "main": [[{"node": "Get Webhook Token", "type": "main", "index": 0}]]
        },
        "Get Webhook Token": {
          "main": [[{"node": "Set Token", "type": "main", "index": 0}]]
        },
        "Set Token": {
          "main": [[{"node": "Fetch Week HTML", "type": "main", "index": 0}]]
        },
        "Fetch Week HTML": {
          "main": [[{"node": "Send to Maude", "type": "main", "index": 0}]]
        }
      },
      "settings": {
        "executionOrder": "v1"
      }
    }
---
apiVersion: n8n.n8n.io/v1alpha1
kind: N8nWorkflow
metadata:
  name: cowtail-weekly-review
  namespace: services
spec:
  n8nInstance:
    serviceRef:
      name: n8n
      namespace: services
      port: 5678
    apiKeySecretRef:
      name: n8n-api-key
      key: api-key
  workflowName: "Cowtail Weekly Review"
  active: true
  deletionPolicy: Retain
  sourceRef:
    kind: ConfigMap
    name: workflow-cowtail-weekly-review
    key: workflow.json
  credentialMappings:
    "1Password Connect": onepassword
