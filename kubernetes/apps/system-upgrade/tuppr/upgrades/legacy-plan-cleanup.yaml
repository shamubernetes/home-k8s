apiVersion: batch/v1
kind: Job
metadata:
  name: legacy-plan-cleanup
  namespace: system-upgrade
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: tuppr
      restartPolicy: Never
      containers:
      - name: cleanup
        image: docker.io/bitnami/kubectl:latest@sha256:13f055d594719a59102c67d2b0c57c92f74c7fc86a02fb2e18736999082e0848
        command:
        - /bin/sh
        - -c
        - kubectl delete plan.upgrade.cattle.io talos kubernetes --ignore-not-found=true
