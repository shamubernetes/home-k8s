apiVersion: batch/v1
kind: Job
metadata:
  name: legacy-plan-cleanup
  namespace: system-upgrade
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: tuppr
      restartPolicy: Never
      containers:
      - name: cleanup
        image: docker.io/bitnami/kubectl:latest@sha256:175d3e94e675f4d078c60fe097087a2d77dbc9f76d49d4185c83ca79489c2a46
        command:
        - /bin/sh
        - -c
        - kubectl delete plan.upgrade.cattle.io talos kubernetes --ignore-not-found=true
