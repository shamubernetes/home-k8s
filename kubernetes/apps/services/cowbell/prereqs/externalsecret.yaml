# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cowbell
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: cowbell-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        COWBELL_BACKEND_SECRET: "{{ .COWBELL_BACKEND_SECRET }}"
        COWBELL_HERMES_SECRET: "{{ .COWBELL_HERMES_SECRET }}"
        COWBELL_HERMES_WEBHOOK_SECRET: "{{ .COWBELL_HERMES_WEBHOOK_SECRET }}"
        COWBELL_HERMES_WEBHOOK_URL: https://hermes-gateway.${HOME_DOMAIN}/webhooks/cowbell-issue
        COWBELL_LISTENER_DATABASE_URL: |-
          postgresql://{{ .COWBELL_POSTGRES_USER }}:{{ .COWBELL_POSTGRES_PASS }}@postgres17-pooler-session.database.svc.cluster.local:5432/cowbell?sslmode=disable
        DATABASE_URL: |-
          postgresql://{{ .COWBELL_POSTGRES_USER }}:{{ .COWBELL_POSTGRES_PASS }}@postgres17-pooler-session.database.svc.cluster.local:5432/cowbell?sslmode=disable
        PLEX_CLIENT_ID: "{{ .PLEX_CLIENT_ID }}"
        PLEX_SERVER_ID: "{{ .PLEX_SERVER_ID }}"
        PLEX_REDIRECT_URI: https://issue.${HOME_DOMAIN}/auth/plex/callback
        PLEX_PRODUCT_NAME: Cowbell
        PLEX_CATALOG_BASE_URL: http://plex.media.svc.cluster.local:32400
        PLEX_CATALOG_TOKEN: "{{ .PLEX_TOKEN }}"
        TAUTULLI_BASE_URL: http://tautulli.observability.svc.cluster.local
        TAUTULLI_API_KEY: "{{ .TAUTULLI_API_KEY }}"
        CATALOG_CACHE_REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379/9
        POSTER_CACHE_REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379/9
        INIT_POSTGRES_DBNAME: cowbell
        INIT_POSTGRES_HOST: postgres17-pooler-session.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .COWBELL_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .COWBELL_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  data:
  - secretKey: PLEX_TOKEN
    remoteRef:
      key: plex
      property: PLEX_TOKEN
  - secretKey: TAUTULLI_API_KEY
    remoteRef:
      key: tautulli
      property: TAUTULLI_API_KEY
  dataFrom:
  - extract:
      key: cowbell
  - extract:
      key: cloudnative-pg
