# yaml-language-server: $schema=https://k8s-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    deployment:
      envoyGateway:
        image:
          repository: docker.io/envoyproxy/gateway
          # renovate: datasource=docker depName=docker.io/envoyproxy/gateway
          tag: v1.8.1@sha256:497df13b71f4e544c7e80414873041e291776c28cd788bcbee0d18421fa5db98
    config:
      envoyGateway:
        provider:
          type: Kubernetes
          kubernetes:
            leaderElection:
              leaseDuration: 30s
              renewDeadline: 20s
              retryPeriod: 5s
            deploy:
              type: GatewayNamespace
        logging:
          level:
            default: info
