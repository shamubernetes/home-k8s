apiVersion: batch/v1
kind: Job
metadata:
  name: pocket-id-migrate-postgres-s3
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pocket-id-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-db
        image: ghcr.io/home-operations/postgres-init:17.6.0@sha256:86a1992d46273c58fd4ad95b626081dfaabfe16bd56944675169e406d1a660dd
        envFrom:
        - secretRef:
            name: pocket-id-secret
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: ["ALL"]}
      - name: export-sqlite
        image: ghcr.io/pocket-id/pocket-id:v2.10.0-distroless@sha256:244c5d2613b1b89b18a8fee07e47e9a43907a09009c6280236131fccf1ba5f9f
        command: [/app/pocket-id]
        args: [export, --path, /work/pocket-id-export.zip]
        env:
        - name: DB_CONNECTION_STRING
          value: /legacy/pocket-id.db
        - name: ENCRYPTION_KEY_FILE
          value: /legacy/encryption_key
        - name: FILE_BACKEND
          value: filesystem
        - name: UPLOAD_PATH
          value: /legacy/uploads
        volumeMounts:
        - name: legacy-data
          mountPath: /legacy
          readOnly: true
        - name: work
          mountPath: /work
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
      containers:
      - name: import-postgres-s3
        image: ghcr.io/pocket-id/pocket-id:v2.10.0@sha256:183f1ae8426f3af0b65878fae9ddbe9a0515f6548c04d8ebb640ad1abd9c8fce
        command: [sh, -ec]
        args:
        - |
          /app/pocket-id import --yes --path /work/pocket-id-export.zip
          /app/pocket-id encryption-key-rotate --yes --new-key "$(cat /new-key/ENCRYPTION_KEY)"
        env:
        - name: DB_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: pocket-id-secret
              key: DB_CONNECTION_STRING
        - name: ENCRYPTION_KEY_FILE
          value: /legacy/encryption_key
        - name: FILE_BACKEND
          value: s3
        - name: UPLOAD_PATH
          value: uploads
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: pocket-id-bucket
              key: BUCKET_NAME
        - name: S3_REGION
          value: us-east-1
        - name: S3_ENDPOINT
          value: http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local:80
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: pocket-id-bucket
              key: AWS_ACCESS_KEY_ID
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: pocket-id-bucket
              key: AWS_SECRET_ACCESS_KEY
        - name: S3_FORCE_PATH_STYLE
          value: "true"
        - name: S3_DISABLE_DEFAULT_INTEGRITY_CHECKS
          value: "true"
        volumeMounts:
        - name: legacy-data
          mountPath: /legacy
          readOnly: true
        - name: new-key
          mountPath: /new-key
          readOnly: true
        - name: work
          mountPath: /work
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
      volumes:
      - name: legacy-data
        persistentVolumeClaim:
          claimName: pocket-id
      - name: new-key
        secret:
          secretName: pocket-id-secret
          items:
          - key: ENCRYPTION_KEY
            path: ENCRYPTION_KEY
      - name: work
        emptyDir: {}
