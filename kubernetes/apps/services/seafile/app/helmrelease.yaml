# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seafile
spec:
  interval: 10m
  timeout: 20m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      seafile:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/seafileltd/seafile-mc
              tag: 13.0.24@sha256:2b9ed60f028cd5d3eaf3ca774a49ae1ff5ea4e6732863268c7bc7a4d1db8e451
            command:
            - /bin/bash
            - /config-scripts/configure-and-start.sh
            env:
              TIME_ZONE: ${TIMEZONE}
              SEAFILE_SERVER_HOSTNAME: seafile.${HOME_DOMAIN}
              SEAFILE_SERVER_PROTOCOL: https
              SEAFILE_MYSQL_DB_HOST: seafile-mariadb.database.svc.cluster.local
              SEAFILE_MYSQL_DB_PORT: "3306"
              SEAFILE_MYSQL_DB_USER: seafile
              SEAFILE_MYSQL_DB_CCNET_DB_NAME: ccnet_db
              SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: seafile_db
              SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: seahub_db
              CACHE_PROVIDER: redis
              REDIS_HOST: dragonfly.database.svc.cluster.local
              REDIS_PORT: "6379"
              ENABLE_NOTIFICATION_SERVER: "false"
            envFrom:
            - secretRef:
                name: seafile-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 80
                  periodSeconds: 10
                  failureThreshold: 90
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probe
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
    service:
      app:
        controller: seafile
        ports:
          http:
            port: *port
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: internal.${HOME_DOMAIN}
          nginx.ingress.kubernetes.io/proxy-body-size: 100m
        className: internal
        hosts:
        - host: seafile.${HOME_DOMAIN}
          paths:
          - path: /
            service:
              identifier: app
              port: http
    persistence:
      data:
        existingClaim: seafile-data
        globalMounts:
        - path: /shared
      config-scripts:
        type: configMap
        name: seafile-configure-onlyoffice
        defaultMode: 0755
        globalMounts:
        - path: /config-scripts
