# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plane-github-bridge
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: plane-github-bridge-secret
    template:
      engineVersion: v2
      data:
        DATABASE_URL: |-
          postgres://{{ .PLANE_GITHUB_BRIDGE_POSTGRES_USER }}:{{ .PLANE_GITHUB_BRIDGE_POSTGRES_PASS }}@postgres17-pooler.database.svc.cluster.local:5432/plane_github_bridge?sslmode=disable
        PUBLIC_BASE_URL: https://plane-github.${HOME_DOMAIN}
        PLANE_BASE_URL: https://plane.${HOME_DOMAIN}
        PLANE_API_BASE_URL: http://plane-api.services.svc.cluster.local:8000
        PLANE_CLIENT_ID: "{{ .PLANE_CLIENT_ID }}"
        PLANE_CLIENT_SECRET: "{{ .PLANE_SECRET_ID }}"
        PLANE_SCOPES: "projects:read projects.states:read projects.labels:read projects.work_items:read projects.work_items:write projects.work_items.comments:read projects.work_items.comments:write projects:write projects.states:write projects.labels:write projects.members:read projects.work_items.attachments:read projects.work_items.attachments:write projects.work_items.links:read projects.work_items.links:write projects.work_items.relations:read projects.work_items.relations:write projects.work_items.activities:read projects.cycles:read projects.cycles:write projects.modules:read projects.modules:write projects.milestones:read projects.milestones:write projects.epics:read projects.epics:write projects.work_item_types:read projects.work_item_types:write projects.work_item_properties:read projects.work_item_properties:write projects.work_item_property_options:read projects.work_item_property_values:read projects.work_item_property_options:write projects.work_item_property_values:write workspaces.members:read teamspaces:read teamspaces.projects:read teamspaces.members:read profile:read assets:read assets:write"
        PLANE_WEBHOOK_SECRET: "{{ .PLANE_WEBHOOK_SECRET }}"
        GITHUB_WEBHOOK_SECRET: "{{ .GITHUB_WEBHOOK_SECRET }}"
        GITHUB_APP_ID: "{{ .GITHUB_APP_ID }}"
        GITHUB_PRIVATE_KEY: "{{ .GITHUB_PRIVATE_KEY_B64 | b64dec }}"
        GITHUB_API_BASE_URL: https://api.github.com
        PR_OPENED_STATE_NAME: In Progress
        PR_REVIEW_STATE_NAME: In Review
        PR_MERGED_STATE_NAME: Done
        PR_CLOSED_STATE_NAME: Canceled
        INIT_POSTGRES_DBNAME: plane_github_bridge
        INIT_POSTGRES_HOST: postgres17-pooler.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .PLANE_GITHUB_BRIDGE_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .PLANE_GITHUB_BRIDGE_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
  - extract:
      key: cloudnative-pg
  - extract:
      key: plane-github-bridge
  - extract:
      key: Plane App - Github Connector
  - extract:
      key: Github App - Kil.Dev Plane
