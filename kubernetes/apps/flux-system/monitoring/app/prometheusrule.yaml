# yaml-language-server: $schema=https://k8s-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flux-rules
  namespace: flux-system
spec:
  groups:
  - name: flux.rules
    rules:
    - alert: FluxComponentAbsent
      annotations:
        summary: Flux component has disappeared from Prometheus target discovery.
      expr: |
        absent(up{job=~".*flux-system.*"} == 1)
      for: 15m
      labels:
        severity: critical
    - alert: FluxReconciliationFailure
      annotations:
        summary: >-
          {{ $labels.kind }} {{ $labels.exported_namespace }}/{{ $labels.name }} reconciliation
          has been failing for more than 15 minutes.
      expr: |
        max by (exported_namespace, name, kind) (
          label_replace(
            gotk_resource_info{suspended!="true",ready!="True"},
            "kind",
            "$1",
            "customresource_kind",
            "(.*)"
          )
        ) == 1
      for: 15m
      labels:
        severity: critical
