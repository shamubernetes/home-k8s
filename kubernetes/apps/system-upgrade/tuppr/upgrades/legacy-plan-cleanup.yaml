apiVersion: batch/v1
kind: Job
metadata:
  name: legacy-plan-cleanup
  namespace: system-upgrade
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: tuppr
      restartPolicy: Never
      containers:
      - name: cleanup
        image: docker.io/bitnami/kubectl:latest@sha256:95de17e6eb92da83a58c90a9df0c4cede634f898d2e6b92ea04f4a6ee6ace08d
        command:
        - /bin/sh
        - -c
        - kubectl delete plan.upgrade.cattle.io talos kubernetes --ignore-not-found=true
