# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-operator-oauth
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: operator-oauth
    template:
      engineVersion: v2
      data:
        client_id: "{{ .TAILSCALE_OAUTH_CLIENT_ID }}"
        client_secret: "{{ .TAILSCALE_OAUTH_CLIENT_SECRET }}"
  dataFrom:
  - extract:
      key: tailscale
