---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: unpinned
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          initContainers:
          - name: init
            image: ghcr.io/example/init:latest
          containers:
          - name: app
            image: ghcr.io/example/app:1.0.0@sha256:2222222222222222222222222222222222222222222222222222222222222222
