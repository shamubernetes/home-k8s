---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-migration-codex-usage-alert-events
  namespace: services
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS codex_usage_alert_events (
      id BIGSERIAL PRIMARY KEY,
      alert_key VARCHAR(100) NOT NULL,
      event_action VARCHAR(20) NOT NULL,
      current_state VARCHAR(20) NOT NULL,
      window_key VARCHAR(20),
      window_label VARCHAR(20),
      alert_reason VARCHAR(20),
      summary TEXT NOT NULL,
      remaining_percent NUMERIC(5,2),
      used_percent NUMERIC(5,2),
      expected_remaining_percent NUMERIC(5,2),
      expected_used_percent NUMERIC(5,2),
      pace_delta_percent NUMERIC(6,2),
      burn_rate NUMERIC(6,2),
      window_minutes INTEGER,
      minutes_to_reset INTEGER,
      projected_minutes_to_empty INTEGER,
      projected_margin_minutes INTEGER,
      reset_at TIMESTAMP WITH TIME ZONE,
      checked_at TIMESTAMP WITH TIME ZONE NOT NULL,
      dedup_key VARCHAR(100) NOT NULL,
      pagerduty_status VARCHAR(40) NOT NULL,
      pagerduty_message TEXT,
      plan TEXT,
      source TEXT,
      created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_codex_usage_alert_events_latest ON codex_usage_alert_events(alert_key, created_at DESC);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-migrate-codex-usage-alert-events
  namespace: services
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/home-operations/postgres-init:17.6.0@sha256:86a1992d46273c58fd4ad95b626081dfaabfe16bd56944675169e406d1a660dd
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: port
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: password
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: n8n-db-secret
                  key: database
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Running codex usage alert events migration..."
              psql -f /migrations/init.sql
              echo "Migration complete."
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: n8n-migration-codex-usage-alert-events
