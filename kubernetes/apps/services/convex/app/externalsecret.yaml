# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: convex
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: convex-secret
    template:
      engineVersion: v2
      data:
        POSTGRES_URL: |-
          postgresql://{{ .CONVEX_POSTGRES_USER }}:{{ .CONVEX_POSTGRES_PASS }}@postgres17-pooler.database.svc.cluster.local?sslmode=disable
        INSTANCE_SECRET: "{{ .CONVEX_INSTANCE_SECRET }}"
        AWS_ACCESS_KEY_ID: "{{ .S3_ACCESS_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .S3_SECRET_KEY }}"
        PUSH_API_BEARER_TOKEN: "{{ .PUSH_API_BEARER_TOKEN }}"
        COWTAIL_OPENCLAW_OWNER_USER_ID: "{{ .COWTAIL_OPENCLAW_OWNER_USER_ID }}"
        COWTAIL_REALTIME_CONVEX_TOKEN: "{{ .COWTAIL_REALTIME_CONVEX_TOKEN }}"
        # postgres-init
        INIT_POSTGRES_DBNAME: convex
        INIT_POSTGRES_HOST: postgres17-pooler.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .CONVEX_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .CONVEX_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  data:
  - secretKey: PUSH_API_BEARER_TOKEN
    remoteRef:
      key: Cowtail Push API
      property: PUSH_API_BEARER_TOKEN
  - secretKey: COWTAIL_OPENCLAW_OWNER_USER_ID
    remoteRef:
      key: Cowtail Realtime
      property: COWTAIL_OPENCLAW_OWNER_USER_ID
  - secretKey: COWTAIL_REALTIME_CONVEX_TOKEN
    remoteRef:
      key: Cowtail Realtime
      property: COWTAIL_REALTIME_CONVEX_TOKEN
  dataFrom:
  # Postgres creds + instance secret from 1Password
  - extract:
      key: convex
    sourceRef:
      storeRef:
        kind: ClusterSecretStore
        name: op-secret-store
  - extract:
      key: cloudnative-pg
    sourceRef:
      storeRef:
        kind: ClusterSecretStore
        name: op-secret-store
  - extract:
      key: Cowtail APNs
    sourceRef:
      storeRef:
        kind: ClusterSecretStore
        name: op-secret-store
  # S3 creds from CephObjectStoreUser (auto-generated in rook-ceph namespace)
  # Secret keys are: AccessKey, SecretKey, Endpoint
  - extract:
      key: rook-ceph-object-user-ceph-objectstore-convex
    rewrite:
    - regexp:
        source: "AccessKey"
        target: "S3_ACCESS_KEY"
    - regexp:
        source: "SecretKey"
        target: "S3_SECRET_KEY"
    sourceRef:
      storeRef:
        kind: ClusterSecretStore
        name: rook-ceph-secrets
