---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-finance-daily-check
  namespace: services
data:
  workflow.json: |
    {
      "nodes": [
        {
          "parameters": {
            "rule": {
              "interval": [{"field": "cronExpression", "expression": "0 8 * * *"}]
            }
          },
          "id": "schedule-trigger",
          "name": "Daily 8 AM",
          "type": "n8n-nodes-base.scheduleTrigger",
          "typeVersion": 1.2,
          "position": [0, 0]
        },
        {
          "parameters": {
            "resource": "item",
            "operation": "getItemDetails",
            "vaultUUID": "3nk7dheikxygtpdqhyn2opawmy",
            "itemUUID": "3wkp326j4i25n7b7h7oaw622wa",
            "requestOptions": {}
          },
          "id": "get-simplefin",
          "name": "Get SimpleFIN Creds",
          "type": "@n8layer/n8n-nodes-1password.onePassword",
          "typeVersion": 1,
          "position": [220, 0],
          "credentials": {
            "onePasswordApi": {
              "id": "",
              "name": "1Password Connect"
            }
          }
        },
        {
          "parameters": {
            "resource": "item",
            "operation": "getItemDetails",
            "vaultUUID": "3nk7dheikxygtpdqhyn2opawmy",
            "itemUUID": "323cfx7cvjxgh7kchngnuedjzm",
            "requestOptions": {}
          },
          "id": "get-webhook-token",
          "name": "Get Webhook Token",
          "type": "@n8layer/n8n-nodes-1password.onePassword",
          "typeVersion": 1,
          "position": [220, 200],
          "credentials": {
            "onePasswordApi": {
              "id": "",
              "name": "1Password Connect"
            }
          }
        },
        {
          "parameters": {
            "assignments": {
              "assignments": [
                {"id": "simplefinUrl", "name": "simplefinUrl", "value": "={{ $('Get SimpleFIN Creds').first().json.fields.find(f => f.label === 'credential').value }}", "type": "string"},
                {"id": "webhookToken", "name": "webhookToken", "value": "={{ $json.fields.find(f => f.label === 'token').value }}", "type": "string"}
              ]
            },
            "options": {}
          },
          "id": "extract-creds",
          "name": "Extract Credentials",
          "type": "n8n-nodes-base.set",
          "typeVersion": 3.4,
          "position": [440, 100]
        },
        {
          "parameters": {
            "url": "={{ $json.simplefinUrl }}/accounts?start-date={{ Math.floor((Date.now() - 3*24*60*60*1000) / 1000) }}",
            "options": {
              "response": {"response": {"responseFormat": "json"}}
            }
          },
          "id": "fetch-simplefin",
          "name": "Fetch SimpleFIN",
          "type": "n8n-nodes-base.httpRequest",
          "typeVersion": 4.2,
          "position": [660, 100]
        },
        {
          "parameters": {
            "operation": "executeQuery",
            "query": "SELECT account_name, balance FROM finance_daily_balances WHERE run_date = (SELECT MAX(run_date) FROM finance_daily_balances WHERE run_date < CURRENT_DATE) ORDER BY account_name",
            "options": {}
          },
          "id": "get-yesterday-balances",
          "name": "Get Previous Balances",
          "type": "n8n-nodes-base.postgres",
          "typeVersion": 2.5,
          "position": [660, 300],
          "credentials": {
            "postgres": {
              "id": "",
              "name": "Postgres account"
            }
          }
        },
        {
          "parameters": {
            "jsCode": "// Process SimpleFIN data with day-over-day comparison\nconst data = $('Fetch SimpleFIN').first().json;\nconst previousRows = $('Get Previous Balances').all().map(i => i.json);\nconst creds = $('Extract Credentials').first().json;\n\n// Build lookup of previous balances\nconst prevBalances = {};\nfor (const row of previousRows) {\n  prevBalances[row.account_name] = parseFloat(row.balance);\n}\n\nconst now = new Date();\nconst threeDaysAgo = new Date(now);\nthreeDaysAgo.setDate(threeDaysAgo.getDate() - 3);\nconst cutoffStr = threeDaysAgo.toISOString().split('T')[0];\nconst today = now.toISOString().split('T')[0];\n\n// Target debts to track (in payoff order)\nconst TARGET_CARDS = [\n  {name: 'Credit One', last4: '3912', label: 'Credit One 3912'},\n  {name: 'Credit One', last4: '3672', label: 'Credit One 3672'},\n  {name: 'Capital One', last4: '5007', label: 'Capital One 5007'},\n  {name: 'Chase Freedom', last4: '5410', label: 'Chase Freedom'},\n  {name: 'Best Buy', last4: '9893', label: 'Best Buy'},\n  {name: 'Sapphire', last4: '8086', label: 'Sapphire (minimums)'}\n];\n\nlet totalSpent = 0;\nlet alerts = [];\nlet transactions = [];\nlet seenDates = new Set();\n\nconst ALERT_THRESHOLD = 100;\nconst DINING_KEYWORDS = ['DOORDASH', 'UBEREATS', 'GRUBHUB', 'RESTAURANT', 'PIZZA', 'CHIPOTLE'];\n\nfor (const account of data.accounts || []) {\n  for (const txn of account.transactions || []) {\n    const txnDate = new Date(txn.posted * 1000).toISOString().split('T')[0];\n    if (txnDate < cutoffStr) continue;\n    seenDates.add(txnDate);\n    const amount = parseFloat(txn.amount);\n    if (amount >= 0) continue;\n    const absAmount = Math.abs(amount);\n    totalSpent += absAmount;\n    const desc = (txn.description || '').toUpperCase();\n    transactions.push(txnDate + ': $' + absAmount.toFixed(2) + ' - ' + txn.description.substring(0, 35));\n    if (absAmount >= ALERT_THRESHOLD) {\n      alerts.push('BIG: $' + absAmount.toFixed(2) + ' at ' + txn.description.substring(0, 30));\n    }\n    if (DINING_KEYWORDS.some(kw => desc.includes(kw))) {\n      alerts.push('DINING: $' + absAmount.toFixed(2) + ' at ' + txn.description.substring(0, 30));\n    }\n  }\n}\n\n// Build target debt status with day-over-day diff\nlet targetDebts = [];\nlet totalCardDebt = 0;\nlet balanceChanges = [];\nlet todayBalances = []; // for saving to postgres\n\nfor (const target of TARGET_CARDS) {\n  const account = (data.accounts || []).find(a =>\n    a.name.includes(target.name) || (target.last4 && a.name.includes(target.last4))\n  );\n  if (account) {\n    const bal = Math.abs(parseFloat(account.balance));\n    totalCardDebt += bal;\n    const prev = prevBalances[target.label];\n    let diffStr = '';\n    if (prev !== undefined) {\n      const diff = bal - prev;\n      if (Math.abs(diff) >= 0.01) {\n        const sign = diff > 0 ? '+' : '';\n        diffStr = ' (' + sign + '$' + diff.toFixed(2) + ')';\n        if (diff > 1) {\n          balanceChanges.push(target.label + ' went UP $' + diff.toFixed(2) + ' ($' + prev.toFixed(2) + ' → $' + bal.toFixed(2) + ')');\n        } else if (diff < -1) {\n          balanceChanges.push(target.label + ' went DOWN $' + Math.abs(diff).toFixed(2) + ' ($' + prev.toFixed(2) + ' → $' + bal.toFixed(2) + ')');\n        }\n      } else {\n        diffStr = ' (no change)';\n      }\n    } else {\n      diffStr = ' (first run)';\n    }\n    targetDebts.push(target.label + ': $' + bal.toFixed(2) + diffStr);\n    todayBalances.push({ account_name: target.label, last4: target.last4, balance: bal });\n  }\n}\n\n// Total debt diff\nlet totalPrev = 0;\nlet hasPrevTotal = false;\nfor (const target of TARGET_CARDS) {\n  if (prevBalances[target.label] !== undefined) {\n    totalPrev += prevBalances[target.label];\n    hasPrevTotal = true;\n  }\n}\nlet totalDiffStr = '';\nif (hasPrevTotal) {\n  const totalDiff = totalCardDebt - totalPrev;\n  if (Math.abs(totalDiff) >= 0.01) {\n    const sign = totalDiff > 0 ? '+' : '';\n    totalDiffStr = ' (' + sign + '$' + totalDiff.toFixed(2) + ' from yesterday)';\n  } else {\n    totalDiffStr = ' (no change from yesterday)';\n  }\n}\n\n// Build checking balances\nlet checkingBal = [];\nfor (const account of data.accounts || []) {\n  const bal = parseFloat(account.balance);\n  if (bal > 0) {\n    checkingBal.push(account.name + ': $' + bal.toFixed(2));\n  }\n}\n\nconst dateRange = Array.from(seenDates).sort().join(', ') || 'none';\nconst summary = 'Last 3 days spent: $' + totalSpent.toFixed(2) + ' (dates: ' + dateRange + ')';\nconst txnText = transactions.length > 0 ? transactions.join('\\n') : 'No recent spending';\nconst alertText = alerts.length > 0 ? alerts.join('\\n') : 'No alerts';\nconst changesText = balanceChanges.length > 0 ? '\\nBalance Changes (since yesterday):\\n' + balanceChanges.join('\\n') : '\\nNo balance changes since yesterday.';\n\nconst message = 'Daily Finance Check\\n\\n' + summary + '\\n\\nTarget Debts (payoff order):\\n' + targetDebts.join('\\n') + '\\nTotal card debt: $' + totalCardDebt.toFixed(2) + totalDiffStr + changesText + '\\n\\nChecking:\\n' + checkingBal.join('\\n') + '\\n\\nRecent Transactions:\\n' + txnText + '\\n\\nAlerts:\\n' + alertText + '\\n\\nOnly alert Kilian about balance changes shown above. If no changes, just send a brief summary.';\n\nreturn {\n  json: {\n    message: message,\n    totalSpent: totalSpent,\n    totalCardDebt: totalCardDebt,\n    hasAlerts: alerts.length > 0,\n    hasBalanceChanges: balanceChanges.length > 0,\n    webhookToken: creds.webhookToken,\n    todayBalances: todayBalances,\n    runDate: today\n  }\n};"
          },
          "id": "process-data",
          "name": "Process Data",
          "type": "n8n-nodes-base.code",
          "typeVersion": 2,
          "position": [880, 100]
        },
        {
          "parameters": {
            "operation": "executeQuery",
            "query": "={{ (() => { const b = $json.todayBalances; const d = $json.runDate; if (!b || !b.length) return 'SELECT 1'; return b.map(r => 'INSERT INTO finance_daily_balances (run_date, account_name, last4, balance) VALUES (\\'' + d + '\\', \\'' + r.account_name + '\\', \\'' + r.last4 + '\\', ' + r.balance + ') ON CONFLICT (run_date, account_name) DO UPDATE SET balance = EXCLUDED.balance').join('; '); })() }}",
            "options": {}
          },
          "id": "save-today-balances",
          "name": "Save Today Balances",
          "type": "n8n-nodes-base.postgres",
          "typeVersion": 2.5,
          "position": [1100, 300],
          "credentials": {
            "postgres": {
              "id": "",
              "name": "Postgres account"
            }
          }
        },
        {
          "parameters": {
            "method": "POST",
            "url": "http://10.0.10.95:18789/hooks/finance-daily",
            "sendHeaders": true,
            "headerParameters": {
              "parameters": [
                {"name": "Authorization", "value": "=Bearer {{ $json.webhookToken }}"}
              ]
            },
            "sendBody": true,
            "specifyBody": "keypair",
            "bodyParameters": {
              "parameters": [
                {"name": "message", "value": "={{ $json.message }}"}
              ]
            },
            "contentType": "json",
            "options": {}
          },
          "id": "webhook-openclaw",
          "name": "Notify OpenClaw",
          "type": "n8n-nodes-base.httpRequest",
          "typeVersion": 4.2,
          "position": [1100, 100]
        }
      ],
      "connections": {
        "Daily 8 AM": {"main": [[{"node": "Get SimpleFIN Creds", "type": "main", "index": 0}]]},
        "Get SimpleFIN Creds": {"main": [[{"node": "Get Webhook Token", "type": "main", "index": 0}]]},
        "Get Webhook Token": {"main": [[{"node": "Extract Credentials", "type": "main", "index": 0}]]},
        "Extract Credentials": {"main": [[{"node": "Fetch SimpleFIN", "type": "main", "index": 0}, {"node": "Get Previous Balances", "type": "main", "index": 0}]]},
        "Fetch SimpleFIN": {"main": [[{"node": "Process Data", "type": "main", "index": 0}]]},
        "Get Previous Balances": {"main": [[{"node": "Process Data", "type": "main", "index": 0}]]},
        "Process Data": {"main": [[{"node": "Notify OpenClaw", "type": "main", "index": 0}, {"node": "Save Today Balances", "type": "main", "index": 0}]]}
      },
      "settings": {
        "executionOrder": "v1"
      }
    }
---
apiVersion: n8n.n8n.io/v1alpha1
kind: N8nWorkflow
metadata:
  name: finance-daily-check
  namespace: services
spec:
  n8nInstance:
    serviceRef:
      name: n8n
      namespace: services
      port: 5678
    apiKeySecretRef:
      name: n8n-api-key
      key: api-key
  workflowName: "Finance Daily Check"
  active: true
  deletionPolicy: Retain
  sourceRef:
    kind: ConfigMap
    name: workflow-finance-daily-check
    key: workflow.json
  credentialMappings:
    "1Password Connect": onepassword
    "Postgres account": postgres
