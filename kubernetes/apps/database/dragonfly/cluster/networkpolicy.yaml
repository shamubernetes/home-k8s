# Allow Prometheus to scrape dragonfly metrics (port 9999)
# The dragonfly-operator creates a NetworkPolicy that restricts
# port 9999 to only the operator pod. This policy adds Prometheus access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonfly-allow-metrics
  namespace: database
spec:
  podSelector:
    matchLabels:
      app: dragonfly
      app.kubernetes.io/name: dragonfly
      app.kubernetes.io/part-of: dragonfly
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - port: 9999
      protocol: TCP
