# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Meta - Flate"

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      relevant-files: ${{ steps.relevant.outputs.changed_files }}
      kubernetes-files: ${{ steps.kubernetes.outputs.changed_files }}
    steps:
    - name: Get Flate-related files
      id: relevant
      uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
      with:
        patterns: |
          .github/workflows/meta-flux-diff.yaml
          .mise.toml
          kubernetes/**/*
          scripts/check-flate-render
          scripts/flate-render-baseline.tsv
          scripts/tests/test-flate-render.sh

    - name: Get Kubernetes files
      id: kubernetes
      uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
      with:
        patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.relevant-files != '[]' }}
    needs: filter
    name: Flate - Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Setup Flate
      uses: home-operations/flate/action@bf3405a189626478b0aa6ec98dc4d6f7d419df17 # v0.4.12
      with:
        base: ""
        cache: true
        version: 0.4.12

    - name: Validate full rendered tree
      env:
        FLATE_RESTRICT_EGRESS: "true"
      run: scripts/check-flate-render

  diff:
    if: ${{ needs.filter.outputs.kubernetes-files != '[]' }}
    needs: filter
    name: Flate - Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout pull request branch
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: pull
        persist-credentials: false

    - name: Checkout default branch
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: default
        persist-credentials: false
        ref: "${{ github.event.repository.default_branch }}"

    - name: Setup Flate
      uses: home-operations/flate/action@bf3405a189626478b0aa6ec98dc4d6f7d419df17 # v0.4.12
      with:
        base: ""
        cache: true
        version: 0.4.12

    - name: Prepare credential-free snapshots
      env:
        CHANGED_FILES: ${{ needs.filter.outputs.kubernetes-files }}
      run: |
        python3 - <<'PY'
        import json
        import os
        import textwrap
        from pathlib import Path

        changed = json.loads(os.environ["CHANGED_FILES"])
        # Only operator chart changes need private OCI credentials. The n8n
        # instance directory contains plain GitOps manifests and is safe to diff.
        blocked = (
            "kubernetes/apps/services/cowbell/",
            "kubernetes/apps/services/git-mirror-operator/",
            "kubernetes/apps/services/n8n-operator/operator/",
        )
        unsupported = [path for path in changed if path.startswith(blocked)]
        if unsupported:
            raise SystemExit(
                "credential-free Flate rendering cannot validate private chart changes: "
                + ", ".join(unsupported)
            )

        manifest = textwrap.dedent("""\
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: loki-bucket
          namespace: observability
        data:
          BUCKET_NAME: flate-offline-placeholder
          BUCKET_REGION: us-east-1
        """)
        for checkout in (Path("pull"), Path("default")):
            values = checkout / "kubernetes/flux/vars/flate-ci-values.yaml"
            values.write_text(manifest)
            kustomization = checkout / "kubernetes/flux/vars/kustomization.yaml"
            content = kustomization.read_text()
            content = content.replace(
                "resources:\n",
                "resources:\n- ./flate-ci-values.yaml\n",
                1,
            )
            kustomization.write_text(content)
        PY

    - name: Render resource and image diffs
      env:
        FLATE_RESTRICT_EGRESS: "true"
      run: |
        set -euo pipefail
        flate --no-progress diff all \
          --allow-missing-secrets \
          --path pull/kubernetes \
          --path-orig default/kubernetes \
          --output github > rendered.diff &
        resource_pid=$!
        flate --no-progress diff images \
          --allow-missing-secrets \
          --path pull/kubernetes \
          --path-orig default/kubernetes \
          --output json > images.json &
        image_pid=$!
        wait "$resource_pid"
        wait "$image_pid"

    - name: Build rendered review
      id: report
      run: |
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        rendered = Path("rendered.diff").read_text()
        inventory = json.dumps(json.loads(Path("images.json").read_text()), indent=2)
        body = (
            "### Flate rendered resource diff\n\n```diff\n"
            + (rendered or "No rendered resource changes.\n")
            + "```\n\n<details><summary>Changed rendered image inventory</summary>\n\n```json\n"
            + inventory
            + "\n```\n</details>\n"
        )
        limit = 60_000
        if len(body.encode()) > limit:
            encoded = body.encode()[:limit]
            body = encoded.decode(errors="ignore") + "\n\n_Report truncated; see the job logs._\n"
        Path("flate-report.md").write_text(body)
        with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a") as summary:
            summary.write(body)
        with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
            output.write("body<<FLATE_REPORT_EOF\n")
            output.write(body)
            output.write("FLATE_REPORT_EOF\n")
        PY

    - name: Generate comment token
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      id: comment-token
      with:
        app-id: "${{ secrets.BOT_APP_ID }}"
        private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
        permission-pull-requests: write

    - name: Add rendered review comment
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
      with:
        GITHUB_TOKEN: "${{ steps.comment-token.outputs.token }}"
        header: "${{ github.event.pull_request.number }}/kubernetes/flate"
        message: "${{ steps.report.outputs.body }}"

  success:
    if: ${{ !cancelled() }}
    needs:
    - filter
    - test
    - diff
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
    - name: Check required jobs
      env:
        RESULTS: ${{ toJSON(needs.*.result) }}
      run: |
        jq --exit-status 'all(. == "success" or . == "skipped")' <<< "$RESULTS"
