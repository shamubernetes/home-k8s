apiVersion: batch/v1
kind: Job
metadata:
  name: legacy-plan-cleanup
  namespace: system-upgrade
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: tuppr
      restartPolicy: Never
      containers:
      - name: cleanup
        image: docker.io/bitnami/kubectl:latest@sha256:26496fc7c0b8549e3bb352b7c26238a20c1f264532ba42b6d9f67c884ffa0066
        command:
        - /bin/sh
        - -c
        - kubectl delete plan.upgrade.cattle.io talos kubernetes --ignore-not-found=true
