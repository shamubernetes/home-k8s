# yaml-language-server: $schema=https://k8s-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app plane
spec:
  interval: 10m
  chart:
    spec:
      chart: plane-enterprise
      version: 2.6.1
      sourceRef:
        kind: HelmRepository
        name: makeplane
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Ingress
          name: plane-ingress
        patch: |-
          - op: replace
            path: /spec/ingressClassName
            value: internal
      - target:
          kind: ConfigMap
          name: plane-silo-vars
        patch: |-
          - op: replace
            path: /data/APP_BASE_URL
            value: https://plane.${HOME_DOMAIN}
          - op: replace
            path: /data/SILO_API_BASE_URL
            value: https://plane.${HOME_DOMAIN}
      - target:
          kind: Deployment
          name: plane-api-wl
        patch: |-
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: plane-api-wl
          spec:
            template:
              spec:
                initContainers:
                - name: reconcile-auth-config
                  image: makeplane/backend-commercial:v2.6.3
                  imagePullPolicy: Always
                  command:
                  - /bin/bash
                  - -lc
                  - /opt/plane-auth-config-repair/reconcile-auth-config.sh
                  envFrom:
                  - configMapRef:
                      name: plane-app-vars
                      optional: false
                  - secretRef:
                      name: plane-app-secret
                      optional: false
                  - secretRef:
                      name: plane-doc-store-secret
                      optional: false
                  - secretRef:
                      name: plane-opensearch-secret
                      optional: false
                  - secretRef:
                      name: plane-silo-secret
                      optional: false
                  volumeMounts:
                  - name: plane-auth-config-repair
                    mountPath: /opt/plane-auth-config-repair
                    readOnly: true
                volumes:
                - name: plane-auth-config-repair
                  configMap:
                    name: plane-auth-config-repair
                    defaultMode: 0555
  values:
    planeVersion: v2.6.3
    license:
      licenseDomain: plane.${HOME_DOMAIN}
    ingress:
      enabled: true
      ingressClass: nginx
      minioHost: ""
      rabbitmqHost: ""
      ingress_annotations:
        external-dns.alpha.kubernetes.io/target: internal.${HOME_DOMAIN}
        nginx.ingress.kubernetes.io/proxy-body-size: 20m
    ssl:
      createIssuer: false
      generateCerts: false
    services:
      postgres:
        local_setup: false
      redis:
        local_setup: false
      minio:
        local_setup: false
        env:
          minio_endpoint_ssl: true
      rabbitmq:
        local_setup: false
      opensearch:
        local_setup: false
      api:
        annotations: &reloader
          reloader.stakater.com/auto: "true"
      worker:
        memoryRequest: 512Mi
        memoryLimit: 2Gi
        annotations: *reloader
      beatworker:
        annotations: *reloader
      silo:
        enabled: true
        annotations: *reloader
      pi:
        enabled: false
      email_service:
        enabled: false
      outbox_poller:
        enabled: false
      automation_consumer:
        enabled: false
      runner:
        enabled: false
      iframely:
        enabled: false
    external_secrets:
      app_env_existingSecret: plane-app-secret
      live_env_existingSecret: plane-live-secret
      doc_store_existingSecret: plane-doc-store-secret
      rabbitmq_existingSecret: plane-rabbitmq-secret
      opensearch_existingSecret: plane-opensearch-secret
      silo_env_existingSecret: plane-silo-secret
    env:
      storageClass: ceph-block
      remote_redis_url: redis://dragonfly.database.svc.cluster.local:6379/12
      rabbitmq_host: rabbitmq.database.svc.cluster.local
      pgdb_name: plane_enterprise
      pgdb_remote_url: postgresql://unused:unused@postgres17-pooler.database.svc.cluster.local:5432/plane_enterprise?sslmode=disable
      docstore_bucket: uploads
      doc_upload_size_limit: "5242880"
      storage_provider: S3
      web_url: https://plane.${HOME_DOMAIN}
      use_storage_proxy: false
      api_key_rate_limit: 60/minute
