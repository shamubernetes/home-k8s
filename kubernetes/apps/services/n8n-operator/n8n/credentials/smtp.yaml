---
apiVersion: n8n.n8n.io/v1alpha1
kind: N8nCredential
metadata:
  name: smtp-relay
  namespace: services
spec:
  n8nInstance:
    serviceRef:
      name: n8n
      namespace: services
      port: 5678
    apiKeySecretRef:
      name: n8n-api-key
      key: api-key
  credentialName: "SMTP Relay"
  credentialType: "smtp"
  deletionPolicy: Retain
  data:
    host: "smtp-relay.network.svc.cluster.local"
    port: "25"
    secure: "false"
    disableStartTls: "true"
    user: ""
    password: ""
