[tools]
kubectl = "1.36.2"
sops = "3.13.1"
age = "1.3.1"
task = "3.51.1"
flux2 = "2.8.8"
talhelper = "latest"
talosctl = "1.13.3"
krew = "0.5.0"
"npm:renovate" = "latest"

[env]
KUBECONFIG = "{{config_root}}/kubernetes/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
K8S_AUTH_KUBECONFIG = "{{config_root}}/kubernetes/kubeconfig"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
