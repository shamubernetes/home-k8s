# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app oauth2-proxy
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      oauth2-proxy:
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.9.0@sha256:37c1570c0427e02fc7c947ef2c04e8995b8347b7abc9fcf1dbb4e376a4b221a7
            env:
              OAUTH2_PROXY_PROVIDER: oidc
              OAUTH2_PROXY_PROVIDER_DISPLAY_NAME: Pocket ID
              OAUTH2_PROXY_OIDC_ISSUER_URL: https://sso.${HOME_DOMAIN}
              OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
              OAUTH2_PROXY_UPSTREAMS: static://202
              OAUTH2_PROXY_EMAIL_DOMAINS: "*"
              OAUTH2_PROXY_SCOPE: openid email profile groups
              OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
              OAUTH2_PROXY_COOKIE_DOMAINS: .${HOME_DOMAIN}
              OAUTH2_PROXY_WHITELIST_DOMAINS: .${HOME_DOMAIN}
              OAUTH2_PROXY_COOKIE_NAME: __Secure-arrs_sso
              OAUTH2_PROXY_COOKIE_SECURE: "true"
              OAUTH2_PROXY_COOKIE_SAMESITE: lax
              OAUTH2_PROXY_COOKIE_REFRESH: 1h
              OAUTH2_PROXY_REVERSE_PROXY: "true"
              OAUTH2_PROXY_TRUSTED_PROXY_IPS: 10.69.0.0/16
              OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
              OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
            envFrom:
            - secretRef:
                name: oauth2-proxy-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: &port 4180
                  periodSeconds: 10
                  timeoutSeconds: 2
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 2
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
        pod:
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app.kubernetes.io/controller: *app
                app.kubernetes.io/instance: *app
                app.kubernetes.io/name: *app
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    ingress:
      app:
        className: internal
        hosts:
        - &host
          host: bazarr.${HOME_DOMAIN}
          paths: &paths
          - path: /oauth2
            service:
              identifier: app
              port: http
        - <<: *host
          host: listenarr.${HOME_DOMAIN}
          paths: *paths
        - <<: *host
          host: profilarr.${HOME_DOMAIN}
          paths: *paths
        - <<: *host
          host: prowlarr.${HOME_DOMAIN}
          paths: *paths
        - <<: *host
          host: radarr.${HOME_DOMAIN}
          paths: *paths
        - <<: *host
          host: radarr-3d.${HOME_DOMAIN}
          paths: *paths
        - <<: *host
          host: sab.${HOME_DOMAIN}
          paths: *paths
        - <<: *host
          host: sonarr.${HOME_DOMAIN}
          paths: *paths
        - <<: *host
          host: whisparr.${HOME_DOMAIN}
          paths: *paths
