---
# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-credential-smtp
  namespace: services
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: n8n-credential-smtp
    template:
      engineVersion: v2
      data:
        password: "{{ .AppPassword }}"
  dataFrom:
    - extract:
        key: maude-smtp
---
apiVersion: n8n.n8n.io/v1alpha1
kind: N8nCredential
metadata:
  name: smtp-relay
  namespace: services
spec:
  n8nInstance:
    serviceRef:
      name: n8n
      namespace: services
      port: 5678
    apiKeySecretRef:
      name: n8n-api-key
      key: api-key
  credentialName: "SMTP Relay"
  credentialType: "smtp"
  deletionPolicy: Retain
  secretRef:
    name: n8n-credential-smtp
  data:
    host: "smtp.fastmail.com"
    port: "465"
    secure: "true"
    user: "maude@maudeco.de"
  fieldMappings:
    password: password
