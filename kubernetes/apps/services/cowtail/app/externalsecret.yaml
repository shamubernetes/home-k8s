# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cowtail
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: cowtail-secret
  data:
  - secretKey: PUSH_API_BEARER_TOKEN
    remoteRef:
      key: Cowtail Push API
      property: PUSH_API_BEARER_TOKEN
  - secretKey: OPENCLAW_COWTAIL_BRIDGE_TOKEN
    remoteRef:
      key: Cowtail Realtime
      property: OPENCLAW_COWTAIL_BRIDGE_TOKEN
  - secretKey: COWTAIL_OPENCLAW_OWNER_USER_ID
    remoteRef:
      key: Cowtail Realtime
      property: COWTAIL_OPENCLAW_OWNER_USER_ID
  - secretKey: COWTAIL_REALTIME_CONVEX_TOKEN
    remoteRef:
      key: Cowtail Realtime
      property: COWTAIL_REALTIME_CONVEX_TOKEN
  dataFrom:
  - extract:
      key: Cowtail APNs
