# yaml-language-server: $schema=https://k8s-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plane-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: op-secret-store
  target:
    name: plane-mcp-secret
    template:
      engineVersion: v2
      data:
        PLANE_MCP_AUTH_TOKEN: "{{ .PLANE_MCP_AUTH_TOKEN }}"
        config.yaml: "{{ .PLANE_CLI_CONFIG }}"
  dataFrom:
  - extract:
      key: plane-mcp
