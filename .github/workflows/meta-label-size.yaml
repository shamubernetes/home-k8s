# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Meta - Label Size"

on:
  workflow_dispatch:
  pull_request_target:
    branches: ["main"]

jobs:
  label-size:
    name: Label Size
    runs-on: ["ghar-set-zoo"]
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Label Size
      uses: pascalgn/size-label-action@56b489b027932ec0cf60438a1a5f1a19c8fc71ff # v0.5.7
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        sizes: >
          {
            "0": "XS",
            "20": "S",
            "50": "M",
            "200": "L",
            "800": "XL",
            "2000": "XXL"
          }
