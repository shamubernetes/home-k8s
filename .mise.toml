[tools]
actionlint = "1.7.12"
kubectl = "1.36.2"
sops = "3.13.1"
age = "1.3.1"
task = "3.51.1"
flux2 = "2.8.8"
helm = "4.2.3"
jq = "1.8.2"
python = "3.14.6"
"github:budimanjojo/talhelper" = "3.1.14"
"github:home-operations/flate" = "0.4.12"
talosctl = "1.13.4"
krew = "0.5.0"
"npm:renovate" = "latest"
shellcheck = "0.11.0"
zizmor = "1.28.0"
"asdf:sudermanjr/asdf-yq" = "4.53.3"

[env]
KUBECONFIG = "{{config_root}}/kubernetes/kubeconfig"
