# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cowtail
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      cowtail:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maudecode/cowtail
              tag: 0.9.1@sha256:78a2c6eca4f4233d9744b9a9dc7570d070604b495cb595730e46d14f800b17b6
            env:
              TZ: America/New_York
              CONVEX_API_UPSTREAM: http://convex-backend.services.svc.cluster.local:3210
              CONVEX_ACTIONS_UPSTREAM: http://convex-backend.services.svc.cluster.local:3211/
              PROMETHEUS_UPSTREAM: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/
              UNIVERSAL_LINKS_APP_ID:
                valueFrom:
                  secretKeyRef:
                    name: cowtail-secret
                    key: UNIVERSAL_LINKS_APP_ID
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              # nginx's entrypoint needs its default root startup behavior here
              # (envsubst, temp dir ownership, then dropping privileges).
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
      cowtail-realtime:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maudecode/cowtail-realtime
              tag: 0.9.1@sha256:db78867da472f46091b726aff2bc09aa8c871d067825e9c38f920c871e157fb7
            env:
              TZ: America/New_York
              PORT: &realtimePort 8787
              COWTAIL_HTTP_BASE_URL: http://convex-backend.services.svc.cluster.local:3211
              CONVEX_URL: http://convex-backend.services.svc.cluster.local:3210
            envFrom:
            - secretRef:
                name: cowtail-secret
            probes:
              liveness: &realtimeProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *realtimePort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *realtimeProbes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    configMaps:
      config:
        data:
          config.json: |
            {
              "cephDashboardUrl": "https://rook.${HOME_DOMAIN}"
            }
    persistence:
      config:
        type: configMap
        name: cowtail
        advancedMounts:
          cowtail:
            app:
            - path: /etc/cowtail
              readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          cowtail-realtime:
            app:
            - path: /tmp
    defaultPodOptions:
      securityContext:
        # Cowtail's nginx image renders config and Universal Links files at startup,
        # which requires write access to root-owned image paths under /etc/nginx and
        # /usr/share/nginx/html.
        runAsNonRoot: false
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: cowtail
        ports:
          http:
            port: *port
      realtime:
        controller: cowtail-realtime
        ports:
          http:
            port: *realtimePort
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${HOME_DOMAIN}
          nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
        className: external
        hosts:
        - host: cowtail.${HOME_DOMAIN}
          paths:
          - path: /openclaw/realtime
            service:
              identifier: realtime
              port: http
          - path: /
            service:
              identifier: app
              port: http
