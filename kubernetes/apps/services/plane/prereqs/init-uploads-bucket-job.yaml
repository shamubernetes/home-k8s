# yaml-language-server: $schema=https://k8s-schemas.pages.dev/kubernetes/master/job-batch-v1.json
apiVersion: batch/v1
kind: Job
metadata:
  name: plane-init-uploads-bucket
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init-bucket
        image: docker.io/amazon/aws-cli:2.35.9@sha256:01be46681e0bd75da54c2ca7c4edad9ecd29499f664cac5f6cbf0a189d67d0f3
        envFrom:
        - secretRef:
            name: plane-doc-store-secret
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -eu
          export AWS_DEFAULT_REGION="${AWS_REGION:-us-east-1}"
          aws --endpoint-url "$AWS_S3_ENDPOINT_URL" --region "$AWS_DEFAULT_REGION" s3 mb "s3://uploads" 2>/dev/null || true
