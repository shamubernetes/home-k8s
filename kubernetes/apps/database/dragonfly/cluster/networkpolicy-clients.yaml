# Allow shared Redis clients to reach Dragonfly across namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonfly-allow-clients
  namespace: database
spec:
  podSelector:
    matchLabels:
      app: dragonfly
      app.kubernetes.io/name: dragonfly
      app.kubernetes.io/part-of: dragonfly
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: games
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: media
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: renovate
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: security
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: services
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tools
    ports:
    - port: 6379
      protocol: TCP
